services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: culture
      POSTGRES_PASSWORD: culture
      POSTGRES_DB: culture_eats
    ports: ["5432:5432"]
    volumes: [dbdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  dbdata:
