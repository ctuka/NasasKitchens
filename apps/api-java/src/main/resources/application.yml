server:
  port: ${JAVA_API_PORT:8080}

spring:
  application:
    name: nanas-kitchens-api
  web:
    error:
      # Clients (web UI, agent) read error codes like MENU_NOT_PUBLISHED from the message
      # field, matching the NestJS error body shape.
      include-message: always
  datasource:
    # Shares the Prisma-managed culture_eats database with the NestJS service (strangler
    # migration: both backends see the same data while modules move over one by one).
    # stringtype=unspecified lets JDBC write into Prisma's Postgres enum columns ("Role", ...).
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/culture_eats?stringtype=unspecified}
    username: ${DB_USER:culture}
    password: ${DB_PASSWORD:culture}
  jpa:
    # Prisma owns the schema/migrations during the transition — never let Hibernate touch it.
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      # Prisma tables/columns are quoted camelCase ("User"."passwordHash"); quote everything.
      hibernate.globally_quoted_identifiers: true
  ai:
    # Both starters are on the classpath; this picks which ChatModel autoconfigures.
    # Dev default is Gemini (free tier); set AI_PROVIDER=anthropic for the full version.
    model:
      chat: ${AI_PROVIDER:google-genai}
    # Free-tier RPM cap: the agentic tool loop makes several model calls per user message,
    # so 429s are expected in bursts. Back off and retry instead of failing the request.
    retry:
      max-attempts: 4
      on-http-codes: [429, 503]
      backoff:
        initial-interval: 3s
        multiplier: 2
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-opus-4-8
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            # "-latest" aliases track current models, so retired ids (e.g.
            # gemini-2.5-flash, gone 2026-07) don't 404 the chat agent. Lite tier
            # because the free-tier flash alias frequently 503s under load.
            model: ${GEMINI_MODEL:gemini-flash-lite-latest}

app:
  stripe:
    # Test-mode key (sk_test_...). Empty = payments skipped (orders confirm without charge).
    secret-key: ${STRIPE_SECRET_KEY:}
  delivery:
    # mock = fake courier for dev (Story 4.2 swaps in doordash when Drive credentials exist).
    provider: ${DELIVERY_PROVIDER:mock}
    mock-fee-cents: 399
  jwt:
    # Shared with the NestJS service's JWT_SECRET so access tokens are valid on both
    # backends during the migration. Must be >= 32 bytes (HS256 key requirement).
    secret: ${JWT_SECRET:please-change-this-jwt-secret-in-prod-32b}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30
  address-enc-key: ${ADDRESS_ENC_KEY:32-byte-hex-key-change-me-0000000000}
