name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env: { POSTGRES_USER: culture, POSTGRES_PASSWORD: culture, POSTGRES_DB: culture_eats }
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://culture:culture@localhost:5432/culture_eats
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret
      JWT_REFRESH_SECRET: ci-secret-2
      ADDRESS_ENC_KEY: 32-byte-hex-key-change-me-0000000000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter api prisma:migrate:deploy
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
